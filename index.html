<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🐍 Python 程式學習 — 27 題互動教材</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 載入畫面 -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-title">🐍 Python 程式學習教材</div>
  <div class="loading-sub" id="loading-msg">正在初始化...（第一次約需 10-20 秒）</div>
</div>

<!-- 頂部 -->
<div id="topbar">
  <div>🐍</div>
  <h1>Python 程式學習</h1>
  <span id="progress-stats">0 / 27 完成</span>
  <span id="pyodide-status">⏳ 載入中</span>
  <span class="sub">共 27 題</span>
</div>
<!-- 漸層進度條 -->
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<!-- 篩選欄 -->
<div id="filter-bar"></div>

<div id="main">
  <div id="sidebar"><div id="sidebar-inner"></div></div>
  <div id="content"><div id="lessons-wrap"></div></div>
</div>

<!-- JS 模組（依序載入） -->
<script src="js/lessons.js"></script>
<script src="js/utils.js"></script>
<script src="js/progress.js"></script>
<script src="js/pyodide.js"></script>
<script src="js/components/output.js"></script>
<script src="js/components/codecard.js"></script>
<script src="js/components/skeleton.js"></script>
<script src="js/components/tabs.js"></script>
<script src="js/components/lesson.js"></script>
<script src="js/components/sidebar.js"></script>
<script src="js/components/filters.js"></script>
<script src="js/app.js"></script>

<!-- Pyodide CDN -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"
  onload="initPyodide()"
  onerror="document.getElementById('pyodide-status').textContent='✗ 無法載入';document.getElementById('pyodide-status').className='error';document.getElementById('loading-msg').textContent='無法連接 CDN，請確認網路';"></script>
</body>
</html>
